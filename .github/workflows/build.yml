name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Xcode Project
        run: |
          # لێرەدا فەرمانی CONFIGURATION_BUILD_DIR مان زیاد کرد بۆ ئەوەی شوێنی ئەپەکە ڕێک بخەین
          xcodebuild clean build \
            -project snapdeeb.xcodeproj \
            -scheme snapdeeb \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/snapdeeb.app Payload/
          zip -r snapdeeb_v5.1.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapdeeb-ipa
          path: snapdeeb_v5.1.ipa
