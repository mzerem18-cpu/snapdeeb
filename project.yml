name: snapdeeb
options:
  bundleIdPrefix: com.snapdeeb
targets:
  snapdeeb:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - snapdeebApp.swift
      - MainTabView.swift
      - DownloadView.swift
      - LibraryView.swift
      - SettingsView.swift
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapdeeb.vsaver
        MARKETING_VERSION: "5.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
